services:
  nginx:
    image: nginx:1.27-alpine
    container_name: edge-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - app-net

  certbot:
    image: certbot/certbot:latest
    container_name: edge-certbot
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap exit TERM;
        while :; do
          certbot renew --webroot -w /var/www/certbot --non-interactive;
          sleep 12h & wait $${!};
        done
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    networks:
      - app-net

  backend:
    image: ${BACKEND_IMAGE}
    container_name: app-backend
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/actuator/health/readiness | grep -Eq '\"status\"[[:space:]]*:[[:space:]]*\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - app-net

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: app-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app-net

  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app-net

networks:
  app-net:
    driver: bridge

volumes:
  redis-data:
  certbot-conf:
  certbot-www:
