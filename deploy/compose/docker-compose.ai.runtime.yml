services:
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    image: awesome-fastapi:${RELEASE_ID}
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${FASTAPI_BIND_HOST:-127.0.0.1}:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health/readyz | grep -Eq '\"status\"[[:space:]]*:[[:space:]]*\"(READY|UP)\"'"]
      interval: 10s
      timeout: 5s
      retries: 12
