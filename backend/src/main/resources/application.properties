spring.application.name=awesome-project
spring.mvc.servlet.path=${API_PATH}

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=${DB_HIKARI_MAXIMUM_POOL_SIZE}
spring.datasource.hikari.minimum-idle=${DB_HIKARI_MINIMUM_IDLE}
spring.datasource.hikari.connection-timeout=${DB_HIKARI_CONNECTION_TIMEOUT}
spring.datasource.hikari.idle-timeout=${DB_HIKARI_IDLE_TIMEOUT}
spring.datasource.hikari.max-lifetime=${DB_HIKARI_MAX_LIFETIME}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

logging.pattern.level=%5p [req:%X{requestId:-}]
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.health.mail.enabled=false
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db,redis
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.release-id=${RELEASE_ID:local}
info.app.git-sha=${GIT_SHA:local}
security.signup.max-request-bytes=${SECURITY_SIGNUP_MAX_REQUEST_BYTES:8192}
security.cors.allowed-origin-patterns=${SECURITY_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://127.0.0.1:5173}
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

ssafy.api.key=${SSAFY_API_KEY}

auth.jwt.secret=${AUTH_JWT_SECRET}
auth.jwt.issuer=${AUTH_JWT_ISSUER}
auth.jwt.access-token-ttl-seconds=${AUTH_ACCESS_TOKEN_TTL_SECONDS}
auth.jwt.refresh-token-ttl-seconds=${AUTH_REFRESH_TOKEN_TTL_SECONDS}

auth.jwt.refresh-cookie.name=${AUTH_REFRESH_COOKIE_NAME:__Host-refresh}
auth.jwt.refresh-cookie.path=${AUTH_REFRESH_COOKIE_PATH:/}
auth.jwt.refresh-cookie.secure=${AUTH_REFRESH_COOKIE_SECURE:true}
auth.jwt.refresh-cookie.same-site=${AUTH_REFRESH_COOKIE_SAME_SITE:Lax}
auth.email-verification.code-ttl-seconds=${AUTH_EMAIL_VERIFICATION_CODE_TTL_SECONDS:300}
auth.email-verification.verified-ttl-seconds=${AUTH_EMAIL_VERIFICATION_VERIFIED_TTL_SECONDS:1800}
auth.email-verification.send-limit-window-seconds=${AUTH_EMAIL_VERIFICATION_SEND_LIMIT_WINDOW_SECONDS:3600}
auth.email-verification.max-send-attempts=${AUTH_EMAIL_VERIFICATION_MAX_SEND_ATTEMPTS:5}
auth.email-verification.verify-attempt-window-seconds=${AUTH_EMAIL_VERIFICATION_VERIFY_ATTEMPT_WINDOW_SECONDS:300}
auth.email-verification.max-verify-attempts=${AUTH_EMAIL_VERIFICATION_MAX_VERIFY_ATTEMPTS:5}
auth.email-verification.mail-from=${AUTH_EMAIL_VERIFICATION_MAIL_FROM:${spring.mail.username}}
auth.password-reset.code-ttl-seconds=${AUTH_PASSWORD_RESET_CODE_TTL_SECONDS:600}
auth.password-reset.send-limit-window-seconds=${AUTH_PASSWORD_RESET_SEND_LIMIT_WINDOW_SECONDS:3600}
auth.password-reset.max-send-attempts=${AUTH_PASSWORD_RESET_MAX_SEND_ATTEMPTS:5}
auth.password-reset.verify-attempt-window-seconds=${AUTH_PASSWORD_RESET_VERIFY_ATTEMPT_WINDOW_SECONDS:600}
auth.password-reset.max-verify-attempts=${AUTH_PASSWORD_RESET_MAX_VERIFY_ATTEMPTS:5}

aws.s3.bucket=${AWS_S3_BUCKET}
aws.s3.region=${AWS_S3_REGION}
aws.s3.presign.default-expire-seconds=${AWS_S3_PRESIGN_DEFAULT_EXPIRE_SECONDS}
aws.s3.presign.max-expire-seconds=${AWS_S3_PRESIGN_MAX_EXPIRE_SECONDS}
aws.s3.upload-limit.max-single-bytes=${AWS_S3_UPLOAD_MAX_SINGLE_BYTES}
aws.s3.upload-limit.max-total-bytes=${AWS_S3_UPLOAD_MAX_TOTAL_BYTES}
aws.s3.upload-limit.max-file-count=${AWS_S3_UPLOAD_MAX_FILE_COUNT}
aws.s3.cache.public-cache-control=${AWS_S3_PUBLIC_CACHE_CONTROL}
aws.s3.cache.private-cache-control=${AWS_S3_PRIVATE_CACHE_CONTROL}

notification.sse.scheduler-pool-size=${NOTIFICATION_SSE_SCHEDULER_POOL_SIZE:4}
notification.sse.heartbeat-seconds=${NOTIFICATION_SSE_HEARTBEAT_SECONDS:25}
notification.sse.emitter-timeout-millis=${NOTIFICATION_SSE_EMITTER_TIMEOUT_MILLIS:3600000}
