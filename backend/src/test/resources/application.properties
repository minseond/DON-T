API_PATH=/api

DB_URL=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
DB_USERNAME=sa
DB_PASSWORD=

REDIS_HOST=localhost
REDIS_PORT=6379

AUTH_JWT_SECRET=test-secret-key-for-local-ci-which-is-long-enough-for-hmac-256
AUTH_JWT_ISSUER=test-suite
AUTH_ACCESS_TOKEN_TTL_SECONDS=3600
AUTH_REFRESH_TOKEN_TTL_SECONDS=86400

auth.jwt.secret=${AUTH_JWT_SECRET}
auth.jwt.issuer=${AUTH_JWT_ISSUER}
auth.jwt.access-token-ttl-seconds=${AUTH_ACCESS_TOKEN_TTL_SECONDS}
auth.jwt.refresh-token-ttl-seconds=${AUTH_REFRESH_TOKEN_TTL_SECONDS}
auth.jwt.refresh-cookie.name=__Host-refresh
auth.jwt.refresh-cookie.path=/
auth.jwt.refresh-cookie.secure=true
auth.jwt.refresh-cookie.same-site=Lax

auth.email-verification.code-ttl-seconds=300
auth.email-verification.verified-ttl-seconds=1800
auth.email-verification.send-limit-window-seconds=3600
auth.email-verification.max-send-attempts=5
auth.email-verification.verify-attempt-window-seconds=300
auth.email-verification.max-verify-attempts=5
auth.email-verification.mail-from=test@dont.local

auth.password-reset.code-ttl-seconds=600
auth.password-reset.send-limit-window-seconds=3600
auth.password-reset.max-send-attempts=5
auth.password-reset.verify-attempt-window-seconds=600
auth.password-reset.max-verify-attempts=5

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=create-drop

ssafy.api.key=test-ssafy-api-key

aws.s3.bucket=test-bucket
aws.s3.region=ap-northeast-2

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@dont.local
spring.mail.password=test-password
